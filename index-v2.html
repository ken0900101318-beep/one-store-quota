<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ONE桌遊 開店區域查詢系統 v2.0</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft JhengHei', 'PingFang TC', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        h1 {
            color: #ff6b35;
            font-size: 2.5em;
            margin-bottom: 10px;
            text-align: center;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 1.1em;
        }

        #loading {
            text-align: center;
            padding: 60px;
            font-size: 1.3em;
            color: #666;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .stat-number {
            font-size: 2.5em;
            font-weight: bold;
            color: #ff6b35;
            margin-bottom: 5px;
        }

        .stat-label {
            color: #666;
            font-size: 1.1em;
        }

        .search-box {
            margin-bottom: 30px;
            display: flex;
            gap: 10px;
        }

        .search-box input {
            flex: 1;
            padding: 15px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1.1em;
        }

        .search-box button {
            padding: 15px 40px;
            background: linear-gradient(135deg, #ff6b35 0%, #f7931e 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1em;
            cursor: pointer;
        }

        .area-card {
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
            transition: all 0.3s;
        }

        .area-card:hover {
            border-color: #ff6b35;
            box-shadow: 0 5px 20px rgba(255, 107, 53, 0.2);
        }

        .area-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .area-title {
            font-size: 1.5em;
            font-weight: bold;
            color: #333;
        }

        .quota-badge {
            background: linear-gradient(135deg, #ff6b35 0%, #f7931e 100%);
            color: white;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 1.1em;
            font-weight: bold;
        }

        .area-info {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 15px;
        }

        .info-item {
            padding: 10px;
            background: #f8f9fa;
            border-radius: 8px;
        }

        .info-label {
            color: #666;
            font-size: 0.9em;
            margin-bottom: 5px;
        }

        .info-value {
            font-size: 1.2em;
            font-weight: bold;
            color: #333;
        }

        .store-list {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 2px dashed #e0e0e0;
        }

        .store-list h4 {
            color: #666;
            margin-bottom: 10px;
        }

        .store-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .store-tag {
            background: #e3f2fd;
            color: #1976d2;
            padding: 5px 15px;
            border-radius: 15px;
            font-size: 0.9em;
        }

        .no-quota {
            background: #fee;
            border-color: #f99;
        }

        .special-note {
            background: #fff3cd;
            border: 2px solid #ffc107;
            padding: 15px;
            border-radius: 10px;
            margin-top: 15px;
            color: #856404;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎲 ONE桌遊 開店區域查詢系統</h1>
        <p class="subtitle">v2.0 - 即時資料同步版</p>

        <div id="loading">
            ⏳ 載入中...
        </div>

        <div id="content" style="display: none;">
            <div class="stats">
                <div class="stat-card">
                    <div class="stat-number" id="totalAreas">0</div>
                    <div class="stat-label">總區域數</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="totalStores">0</div>
                    <div class="stat-label">已開店數</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="availableAreas">0</div>
                    <div class="stat-label">可開店區域</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="remainingQuota">0</div>
                    <div class="stat-label">剩餘名額</div>
                </div>
            </div>

            <div class="search-box">
                <input type="text" id="searchInput" placeholder="搜尋縣市或行政區...">
                <button onclick="searchAreas()">🔍 搜尋</button>
            </div>

            <div id="areasList"></div>
        </div>
    </div>

    <script>
        // Google Sheets 設定
        const SHEET_ID = '1_8lPftvv68FhujnFNaxDL67ne8RlwVzb';
        const PUBLISHED_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQ9aTAthp6AUZdjSiV6JJWB-dzy3UZjdmLpT9BSJo5KHtiqRmcRCWFugywcDBqQDhWRZFPJobwJBsc1/pub';
        const SHEET_GID = '1088268366';  // 區域配額

        let areasData = [];

        // 載入資料
        async function loadData() {
            try {
                const url = `${PUBLISHED_URL}?gid=${SHEET_GID}&single=true&output=csv`;
                const response = await fetch(url);
                const csvText = await response.text();
                
                // 解析 CSV
                const rows = csvText.split('\n').map(row => {
                    return row.split(',').map(cell => cell.trim().replace(/^"|"$/g, ''));
                });
                
                if (rows.length === 0) {
                    throw new Error('沒有資料');
                }
                
                // 轉換為物件陣列
                const headers = rows[0];
                areasData = rows.slice(1).filter(row => row.length > 1 && row[0]).map(row => {
                    return {
                        county: row[0] || '',
                        district: row[1] || '',
                        population: parseInt(row[2]) || 0,
                        stores: parseInt(row[3]) || 0,
                        storeNames: row[4] ? row[4].split('|').filter(s => s) : [],
                        status: row[5] || '正常',
                        note: row[6] || '',
                        quota: parseInt(row[7]) || 0
                    };
                });

                // 顯示資料
                displayStats();
                displayAreas();
                
                // 隱藏載入中
                document.getElementById('loading').style.display = 'none';
                document.getElementById('content').style.display = 'block';
                
            } catch (error) {
                console.error('載入失敗:', error);
                document.getElementById('loading').innerHTML = `
                    ❌ 載入失敗：${error.message}<br>
                    <button onclick="location.reload()" style="margin-top: 20px; padding: 10px 30px;">重新載入</button>
                `;
            }
        }

        // 顯示統計
        function displayStats() {
            const totalStores = areasData.reduce((sum, area) => sum + area.stores, 0);
            const availableAreas = areasData.filter(area => area.status === '正常' && area.stores < area.quota).length;
            const remainingQuota = areasData.reduce((sum, area) => {
                if (area.status === '正常') {
                    return sum + Math.max(0, area.quota - area.stores);
                }
                return sum;
            }, 0);

            document.getElementById('totalAreas').textContent = areasData.length;
            document.getElementById('totalStores').textContent = totalStores;
            document.getElementById('availableAreas').textContent = availableAreas;
            document.getElementById('remainingQuota').textContent = remainingQuota;
        }

        // 顯示區域列表
        function displayAreas(filtered = null) {
            const areas = filtered || areasData;
            const container = document.getElementById('areasList');
            
            const html = areas.map(area => {
                const remaining = area.quota - area.stores;
                const isAvailable = area.status === '正常' && remaining > 0;
                const cardClass = isAvailable ? 'area-card' : 'area-card no-quota';
                
                return `
                    <div class="${cardClass}">
                        <div class="area-header">
                            <div class="area-title">${area.county} ${area.district}</div>
                            <div class="quota-badge">${isAvailable ? `剩餘 ${remaining} 名額` : '額滿'}</div>
                        </div>
                        
                        <div class="area-info">
                            <div class="info-item">
                                <div class="info-label">人口數</div>
                                <div class="info-value">${area.population.toLocaleString()} 人</div>
                            </div>
                            <div class="info-item">
                                <div class="info-label">已開店數</div>
                                <div class="info-value">${area.stores} 家</div>
                            </div>
                            <div class="info-item">
                                <div class="info-label">配額上限</div>
                                <div class="info-value">${area.quota} 家</div>
                            </div>
                            <div class="info-item">
                                <div class="info-label">狀態</div>
                                <div class="info-value">${area.status}</div>
                            </div>
                        </div>
                        
                        ${area.storeNames.length > 0 ? `
                            <div class="store-list">
                                <h4>📍 現有店家 (${area.storeNames.length})</h4>
                                <div class="store-tags">
                                    ${area.storeNames.map(name => `<span class="store-tag">${name}</span>`).join('')}
                                </div>
                            </div>
                        ` : ''}
                        
                        ${area.note ? `
                            <div class="special-note">
                                ⚠️ ${area.note}
                            </div>
                        ` : ''}
                    </div>
                `;
            }).join('');
            
            container.innerHTML = html || '<p style="text-align: center; color: #999; padding: 40px;">沒有符合的區域</p>';
        }

        // 搜尋區域
        function searchAreas() {
            const keyword = document.getElementById('searchInput').value.toLowerCase();
            if (!keyword) {
                displayAreas();
                return;
            }
            
            const filtered = areasData.filter(area => {
                return area.county.toLowerCase().includes(keyword) ||
                       area.district.toLowerCase().includes(keyword);
            });
            
            displayAreas(filtered);
        }

        // 搜尋框 Enter 鍵
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('searchInput').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    searchAreas();
                }
            });
        });

        // 載入資料
        loadData();

        // 每 5 分鐘自動更新
        setInterval(loadData, 5 * 60 * 1000);
    </script>
</body>
</html>
