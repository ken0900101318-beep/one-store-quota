<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ONE桌遊 開店區域查詢系統</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft JhengHei', 'PingFang TC', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        h1 {
            color: #ff6b35;
            font-size: 2.5em;
            margin-bottom: 10px;
            text-align: center;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 1.1em;
        }

        .search-box {
            margin-bottom: 30px;
            display: flex;
            gap: 10px;
        }

        .search-box input {
            flex: 1;
            padding: 15px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1.1em;
            transition: border-color 0.3s;
        }

        .search-box input:focus {
            outline: none;
            border-color: #ff6b35;
        }

        .search-box button {
            padding: 15px 40px;
            background: linear-gradient(135deg, #ff6b35 0%, #f7931e 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .search-box button:hover {
            transform: scale(1.05);
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
        }

        .stat-number {
            font-size: 2.5em;
            font-weight: 900;
            color: #ff6b35;
            margin-bottom: 5px;
        }

        .stat-label {
            color: #666;
            font-size: 1em;
        }

        .results {
            margin-top: 30px;
        }

        .result-item {
            background: #f9f9f9;
            border-left: 5px solid #ff6b35;
            padding: 20px;
            margin-bottom: 15px;
            border-radius: 10px;
            transition: transform 0.2s;
        }

        .result-item:hover {
            transform: translateX(5px);
        }

        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .result-title {
            font-size: 1.4em;
            font-weight: bold;
            color: #333;
        }

        .badge {
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9em;
            font-weight: bold;
        }

        .badge-full {
            background: #ff4444;
            color: white;
        }

        .badge-available {
            background: #4caf50;
            color: white;
        }

        .badge-special {
            background: #ffc107;
            color: #333;
        }

        .result-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 15px;
        }

        .detail-item {
            background: white;
            padding: 10px;
            border-radius: 8px;
        }

        .detail-label {
            color: #999;
            font-size: 0.85em;
            margin-bottom: 5px;
        }

        .detail-value {
            font-size: 1.2em;
            font-weight: bold;
            color: #333;
        }

        .stores-list {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #e0e0e0;
        }

        .stores-title {
            color: #666;
            font-size: 0.9em;
            margin-bottom: 10px;
        }

        .store-tag {
            display: inline-block;
            background: #e3f2fd;
            color: #1976d2;
            padding: 5px 12px;
            border-radius: 15px;
            margin: 5px 5px 5px 0;
            font-size: 0.9em;
        }

        .no-results {
            text-align: center;
            padding: 40px;
            color: #999;
            font-size: 1.2em;
        }

        @media (max-width: 768px) {
            .container {
                padding: 20px;
            }

            h1 {
                font-size: 1.8em;
            }

            .search-box {
                flex-direction: column;
            }

            .result-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 ONE桌遊 開店區域查詢系統</h1>
        <p class="subtitle">查詢各區域開店名額 | 數據更新：2026年3月</p>

        <div class="search-box">
            <input type="text" id="searchInput" placeholder="輸入縣市、鄉鎮市區名稱搜尋..." />
            <button onclick="searchArea()">🔍 查詢</button>
        </div>

        <div class="stats">
            <div class="stat-card">
                <div class="stat-number" id="totalAreas">0</div>
                <div class="stat-label">開店區域</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="totalStores">0</div>
                <div class="stat-label">已開業店家</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="fullAreas">0</div>
                <div class="stat-label">額滿區域</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="availableSlots">0</div>
                <div class="stat-label">剩餘名額</div>
            </div>
        </div>

        <div class="results" id="results"></div>
    </div>

    <script>
        // 開店規則
        const QUOTA_RULES = {
            calculate: (population) => {
                if (population < 100000) return 2;
                if (population < 200000) return 3;
                return 4;
            }
        };

        // 區域數據（從 Google Sheets 提取 + 2026年最新人口數據）
        const areasData = [
            // 宜蘭縣
            { county: '宜蘭縣', district: '羅東鎮', population: 68850, stores: 2, storeNames: ['羅東店', '羅東飯店'], isSpecial: false },
            { county: '宜蘭縣', district: '宜蘭市', population: 94396, stores: 1, storeNames: ['宜蘭店'], isSpecial: false },
            
            // 基隆市
            { county: '基隆市', district: '中正區', population: 51434, stores: 2, storeNames: ['基隆海大店', '基隆店'], isSpecial: false },
            
            // 新北市
            { county: '新北市', district: '永和區', population: 211205, stores: 1, storeNames: ['咖麻起永和店'], isSpecial: false },
            { county: '新北市', district: '新店區', population: 306636, stores: 1, storeNames: ['腦力方新店北新店'], isSpecial: false },
            { county: '新北市', district: '土城區', population: 242735, stores: 1, storeNames: ['土城亞東店'], isSpecial: false },
            { county: '新北市', district: '中和區', population: 403396, stores: 3, storeNames: ['中和店', 'IN FUN中和店', 'ONE桌遊中和圓通店'], isSpecial: false },
            { county: '新北市', district: '新莊區', population: 420922, stores: 3, storeNames: ['新莊丹鳳店', 'IN FUN新莊概念店', '新莊輔大店'], isSpecial: false },
            { county: '新北市', district: '樹林區', population: 177130, stores: 3, storeNames: ['麻利好室樹林店', '麻利好室保安店', '腦力方樹林大安'], isSpecial: false },
            { county: '新北市', district: '蘆洲區', population: 196186, stores: 3, storeNames: ['汪桌遊和平概念店', '汪桌遊長安店', '腦力方蘆洲中興'], isSpecial: false },
            { county: '新北市', district: '板橋區', population: 549515, stores: 3, storeNames: ['麻賽客館前店', 'IN FUN站前店', 'ONE板橋忠孝店'], isSpecial: false },
            { county: '新北市', district: '淡水區', population: 208573, stores: 1, storeNames: ['麻利好室淡大店'], isSpecial: false },
            { county: '新北市', district: '三峽區', population: 115421, stores: 1, storeNames: ['Give me 三峽'], isSpecial: false },
            { county: '新北市', district: '三重區', population: 382749, stores: 1, storeNames: ['三元四喜三重店'], isSpecial: false },
            
            // 台北市
            { county: '台北市', district: '中正區', population: 143821, stores: 1, storeNames: ['ONE桌遊台北汀州店'], isSpecial: false },
            { county: '台北市', district: '中山區', population: 211649, stores: 0, storeNames: [], isSpecial: false },
            
            // 桃園市
            { county: '桃園市', district: '八德區', population: 216054, stores: 1, storeNames: ['ONE 八德店'], isSpecial: false },
            { county: '桃園市', district: '大園區', population: 88432, stores: 1, storeNames: ['ONE 大園店'], isSpecial: false },
            { county: '桃園市', district: '中壢區', population: 439290, stores: 4, storeNames: ['內壢文化店', 'ONE 中原店', 'infun中壢中原', '聚樂中壢龍岡店'], isSpecial: false },
            { county: '桃園市', district: '桃園區', population: 478629, stores: 4, storeNames: ['infun桃園', 'ONE 大林', 'ONE 桃園武陵店', 'ONE桌遊桃園夜市店'], isSpecial: false },
            { county: '桃園市', district: '楊梅區', population: 182936, stores: 1, storeNames: ['ONE桌遊楊梅店'], isSpecial: false },
            { county: '桃園市', district: '龜山區', population: 188562, stores: 2, storeNames: ['東瀛龜山店', '雀特GPT桌遊館A7'], isSpecial: false },
            { county: '桃園市', district: '蘆竹區', population: 170423, stores: 1, storeNames: ['南崁店'], isSpecial: false },
            { county: '桃園市', district: '觀音區', population: 76276, stores: 1, storeNames: ['觀音草漯店'], isSpecial: false },
            
            // 新竹市
            { county: '新竹市', district: '北區', population: 154124, stores: 2, storeNames: ['星期八', 'infun新竹'], isSpecial: false },
            { county: '新竹市', district: '東區', population: 222153, stores: 4, storeNames: ['清大店', 'ONE心園', 'Give me貳樓桌遊館', '(待補)'], isSpecial: false },
            
            // 新竹縣
            { county: '新竹縣', district: '湖口鄉', population: 85086, stores: 2, storeNames: ['湖口中山', '鬥陣ONE'], isSpecial: false },
            { county: '新竹縣', district: '新豐鄉', population: 59877, stores: 2, storeNames: ['ONE新豐站前店', 'FAN新豐店'], isSpecial: false },
            { county: '新竹縣', district: '竹北市', population: 221005, stores: 3, storeNames: ['小雀幸', 'ONE高鐵店', 'ONE桌遊竹北店'], isSpecial: true, specialNote: '舊約額滿' },
            { county: '新竹縣', district: '竹東鎮', population: 97844, stores: 1, storeNames: ['麻上玩竹中店'], isSpecial: false },
            
            // 苗栗縣
            { county: '苗栗縣', district: '頭份市', population: 108294, stores: 2, storeNames: ['頭份尚順店', '頭份店'], isSpecial: true, specialNote: '舊約額滿' },
            
            // 台中市
            { county: '台中市', district: '中區', population: 17921, stores: 1, storeNames: ['站前店'], isSpecial: true, specialNote: '舊約額滿但可開放' },
            { county: '台中市', district: '北區', population: 143563, stores: 1, storeNames: ['三民店'], isSpecial: false },
            { county: '台中市', district: '西屯區', population: 237978, stores: 0, storeNames: [], isSpecial: false },
            { county: '台中市', district: '龍井區', population: 79069, stores: 1, storeNames: ['益智生活館東海店'], isSpecial: false },
            
            // 南投縣
            { county: '南投縣', district: '南投市', population: 96077, stores: 1, storeNames: ['南投店'], isSpecial: true, specialNote: '舊約額滿' },
            { county: '南投縣', district: '埔里鎮', population: 75635, stores: 1, storeNames: ['埔里店'], isSpecial: false },
            { county: '南投縣', district: '草屯鎮', population: 97839, stores: 1, storeNames: ['草屯店'], isSpecial: true, specialNote: '舊約額滿' },
            
            // 彰化縣
            { county: '彰化縣', district: '彰化市', population: 220067, stores: 3, storeNames: ['ONE中山店', 'ONE府前店', '益智生活館彰化店'], isSpecial: false },
            { county: '彰化縣', district: '員林市', population: 122013, stores: 1, storeNames: ['摸摸自助桌遊'], isSpecial: false },
            
            // 雲林縣
            { county: '雲林縣', district: '虎尾鎮', population: 71255, stores: 1, storeNames: ['虎尾店'], isSpecial: false },
            { county: '雲林縣', district: '斗六市', population: 108937, stores: 2, storeNames: ['麻友雞斗六店', '(待補)'], isSpecial: true, specialNote: '舊約額滿' },
            
            // 嘉義市
            { county: '嘉義市', district: '西區', population: 145047, stores: 2, storeNames: ['光彩店', '林森西路'], isSpecial: false },
            { county: '嘉義市', district: '東區', population: 116482, stores: 2, storeNames: ['新生店', '公園店'], isSpecial: true, specialNote: '舊約額滿' },
            
            // 嘉義縣
            { county: '嘉義縣', district: '民雄鄉', population: 69731, stores: 1, storeNames: ['民雄店'], isSpecial: true, specialNote: '舊約額滿' },
            
            // 台南市
            { county: '台南市', district: '東區', population: 180556, stores: 2, storeNames: ['方城台南長榮店', 'AX桌遊台南東區店'], isSpecial: true, specialNote: '舊約額滿' },
            { county: '台南市', district: '永康區', population: 235963, stores: 3, storeNames: ['永康崑大店', '方城台南中華店', '方城永康中正店'], isSpecial: false },
            { county: '台南市', district: '中西區', population: 76683, stores: 1, storeNames: ['台南站前中山店'], isSpecial: true, specialNote: '舊約額滿' },
            
            // 高雄市
            { county: '高雄市', district: '仁武區', population: 99541, stores: 1, storeNames: ['仁武店'], isSpecial: false },
            { county: '高雄市', district: '三民區', population: 328532, stores: 2, storeNames: ['大昌店', '三民店'], isSpecial: false },
            { county: '高雄市', district: '苓雅區', population: 160900, stores: 1, storeNames: ['苓雅店'], isSpecial: false },
            { county: '高雄市', district: '前鎮區', population: 176568, stores: 1, storeNames: ['ONE高雄前鎮'], isSpecial: false },
            
            // 屏東縣
            { county: '屏東縣', district: '屏東市', population: 191218, stores: 1, storeNames: ['中正店'], isSpecial: false },
            
            // 澎湖縣
            { county: '澎湖縣', district: '馬公市', population: 63090, stores: 1, storeNames: ['澎湖店'], isSpecial: false },
            
            // 金門縣
            { county: '金門縣', district: '金寧鄉', population: 35619, stores: 1, storeNames: ['金門店'], isSpecial: false }
        ];

        // 計算每個區域的配額和狀態
        areasData.forEach(area => {
            area.quota = QUOTA_RULES.calculate(area.population);
            area.remaining = area.quota - area.stores;
            area.isFull = area.remaining <= 0;
        });

        // 更新統計數據
        function updateStats() {
            document.getElementById('totalAreas').textContent = areasData.length;
            document.getElementById('totalStores').textContent = areasData.reduce((sum, a) => sum + a.stores, 0);
            document.getElementById('fullAreas').textContent = areasData.filter(a => a.isFull).length;
            document.getElementById('availableSlots').textContent = areasData.reduce((sum, a) => sum + Math.max(0, a.remaining), 0);
        }

        // 搜尋功能
        function searchArea() {
            const query = document.getElementById('searchInput').value.trim().toLowerCase();
            const resultsDiv = document.getElementById('results');
            
            if (!query) {
                resultsDiv.innerHTML = '<div class="no-results">請輸入縣市或鄉鎮市區名稱進行搜尋</div>';
                return;
            }

            const results = areasData.filter(area => 
                area.county.toLowerCase().includes(query) || 
                area.district.toLowerCase().includes(query)
            );

            if (results.length === 0) {
                resultsDiv.innerHTML = '<div class="no-results">找不到相關區域</div>';
                return;
            }

            resultsDiv.innerHTML = results.map(area => `
                <div class="result-item">
                    <div class="result-header">
                        <div class="result-title">${area.county} ${area.district}</div>
                        <div>
                            ${area.isFull ? '<span class="badge badge-full">額滿</span>' : '<span class="badge badge-available">可開店</span>'}
                            ${area.isSpecial ? '<span class="badge badge-special">' + (area.specialNote || '特殊') + '</span>' : ''}
                        </div>
                    </div>
                    <div class="result-details">
                        <div class="detail-item">
                            <div class="detail-label">人口數</div>
                            <div class="detail-value">${area.population.toLocaleString()}</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">店家限額</div>
                            <div class="detail-value">${area.quota} 家</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">已開業</div>
                            <div class="detail-value">${area.stores} 家</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">剩餘名額</div>
                            <div class="detail-value" style="color: ${area.remaining > 0 ? '#4caf50' : '#ff4444'}">${Math.max(0, area.remaining)} 家</div>
                        </div>
                    </div>
                    ${area.storeNames.length > 0 ? `
                        <div class="stores-list">
                            <div class="stores-title">已開業店家：</div>
                            ${area.storeNames.map(store => `<span class="store-tag">${store}</span>`).join('')}
                        </div>
                    ` : ''}
                </div>
            `).join('');
        }

        // 頁面載入時更新統計
        window.onload = () => {
            updateStats();
        };

        // Enter 鍵搜尋
        document.getElementById('searchInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') searchArea();
        });
    </script>
</body>
</html>
