<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ONE桌遊 開店區域查詢系統</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft JhengHei', 'PingFang TC', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        h1 {
            color: #ff6b35;
            font-size: 2.5em;
            margin-bottom: 10px;
            text-align: center;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 1.1em;
        }

        .search-box {
            margin-bottom: 30px;
            display: flex;
            gap: 10px;
        }

        .search-box input {
            flex: 1;
            padding: 15px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1.1em;
            transition: border-color 0.3s;
        }

        .search-box input:focus {
            outline: none;
            border-color: #ff6b35;
        }

        .search-box button {
            padding: 15px 40px;
            background: linear-gradient(135deg, #ff6b35 0%, #f7931e 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .search-box button:hover {
            transform: scale(1.05);
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .stat-card.clickable {
            background: linear-gradient(135deg, #fff5f0 0%, #ffe6d5 100%);
            border: 2px solid #ff6b35;
        }

        .stat-number {
            font-size: 2.5em;
            font-weight: 900;
            color: #ff6b35;
            margin-bottom: 5px;
        }

        .stat-label {
            color: #666;
            font-size: 1em;
        }

        .results {
            margin-top: 30px;
        }

        .result-item {
            background: #f9f9f9;
            border-left: 5px solid #ff6b35;
            padding: 20px;
            margin-bottom: 15px;
            border-radius: 10px;
            transition: transform 0.2s;
        }

        .result-item:hover {
            transform: translateX(5px);
        }

        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .result-title {
            font-size: 1.4em;
            font-weight: bold;
            color: #333;
        }

        .badge {
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9em;
            font-weight: bold;
        }

        .badge-full {
            background: #ff4444;
            color: white;
        }

        .badge-available {
            background: #4caf50;
            color: white;
        }

        .badge-special {
            background: #ffc107;
            color: #333;
        }

        .result-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmin(150px, 1fr));
            gap: 15px;
            margin-bottom: 15px;
        }

        .detail-item {
            background: white;
            padding: 10px;
            border-radius: 8px;
        }

        .detail-label {
            color: #999;
            font-size: 0.85em;
            margin-bottom: 5px;
        }

        .detail-value {
            font-size: 1.2em;
            font-weight: bold;
            color: #333;
        }

        .stores-list {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #e0e0e0;
        }

        .stores-title {
            color: #666;
            font-size: 0.9em;
            margin-bottom: 10px;
        }

        .store-tag {
            display: inline-block;
            background: #e3f2fd;
            color: #1976d2;
            padding: 5px 12px;
            border-radius: 15px;
            margin: 5px 5px 5px 0;
            font-size: 0.9em;
        }

        .no-results {
            text-align: center;
            padding: 40px;
            color: #999;
            font-size: 1.2em;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 1000;
            overflow-y: auto;
        }

        .modal-content {
            max-width: 900px;
            margin: 50px auto;
            background: white;
            border-radius: 20px;
            padding: 40px;
            position: relative;
        }

        .modal-close {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 2em;
            cursor: pointer;
            color: #999;
            transition: color 0.3s;
        }

        .modal-close:hover {
            color: #ff6b35;
        }

        .modal-title {
            font-size: 2em;
            color: #ff6b35;
            margin-bottom: 20px;
        }

        .modal-list {
            display: grid;
            gap: 15px;
        }

        .modal-item {
            background: #f9f9f9;
            padding: 15px;
            border-radius: 10px;
            border-left: 4px solid #ff6b35;
        }

        .modal-item-title {
            font-size: 1.2em;
            font-weight: bold;
            color: #333;
            margin-bottom: 5px;
        }

        .modal-item-details {
            color: #666;
            font-size: 0.9em;
        }

        @media (max-width: 768px) {
            .container {
                padding: 20px;
            }

            h1 {
                font-size: 1.8em;
            }

            .search-box {
                flex-direction: column;
            }

            .result-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }

            .modal-content {
                margin: 20px;
                padding: 20px;
            }
        }
    </style>
</head>

        // 方案 A：計算熱門開店推薦（人口>20萬 + 未額滿，分北中南）
        function calculateHotZones() {
            // 區域分類
            const regionMap = {
                '北部': ['台北市', '新北市', '基隆市', '桃園市', '新竹市', '新竹縣', '宜蘭縣'],
                '中部': ['台中市', '彰化縣', '南投縣', '苗栗縣', '雲林縣'],
                '南部': ['嘉義市', '嘉義縣', '台南市', '高雄市', '屏東縣', '花蓮縣', '台東縣', '澎湖縣', '金門縣']
            };
            
            const result = {};
            
            ['北部', '中部', '南部'].forEach(region => {
                const areas = areasData.filter(area => {
                    const remaining = area.quota - area.stores;
                    
                    // 篩選條件：屬於該區域 + 人口 > 20萬 + 未額滿 + 非特殊區域
                    return regionMap[region].includes(area.county) &&
                           area.population > 200000 && 
                           remaining > 0 && 
                           !area.isSpecial;
                }).map(area => {
                    const key = `${area.county}${area.district}`;
                    const remaining = area.quota - area.stores;
                    return { ...area, key, remaining };
                }).sort((a, b) => b.remaining - a.remaining); // 按剩餘名額排序
                
                result[region] = areas;
            });
            
            return result;
        }

        // 顯示熱門推薦（分北中南）
        function displayHotZones() {
            const hotZonesByRegion = calculateHotZones();
            const container = document.getElementById('hotZonesList');
            
            const regionColors = {
                '北部': '#2196f3',
                '中部': '#ff9800',
                '南部': '#4caf50'
            };
            
            const regionIcons = {
                '北部': '🏙️',
                '中部': '🏞️',
                '南部': '🌴'
            };
            
            let html = '';
            
            ['北部', '中部', '南部'].forEach(region => {
                const areas = hotZonesByRegion[region];
                
                if (areas.length === 0) {
                    return; // 跳過無資料的區域
                }
                
                html += `
                    <div style="margin-bottom: 30px;">
                        <h3 style="color: ${regionColors[region]}; font-size: 1.3em; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 3px solid ${regionColors[region]};">
                            ${regionIcons[region]} ${region}地區推薦
                        </h3>
                `;
                
                html += areas.slice(0, 5).map((area, index) => {
                    const university = universityZones[area.key];
                    
                    return `
                        <div style="background: ${index === 0 ? '#fff9e6' : '#f9f9f9'}; padding: 18px; border-radius: 10px; margin-bottom: 12px; border-left: 4px solid ${index === 0 ? regionColors[region] : '#ddd'};">
                            <div style="font-size: 1.2em; font-weight: bold; color: #333; margin-bottom: 8px;">
                                ${index + 1}. ${area.county}${area.district}
                                ${university ? `<span style="background: #e3f2fd; color: #1976d2; padding: 2px 8px; border-radius: 10px; font-size: 0.65em; margin-left: 6px;">🎓 ${university}</span>` : ''}
                            </div>
                            <div style="color: #666; font-size: 0.9em;">
                                👥 人口 ${(area.population / 10000).toFixed(1)} 萬 | 
                                📊 限額 ${area.quota} 家 | 
                                🏪 已開 ${area.stores} 家 | 
                                <span style="color: ${regionColors[region]}; font-weight: bold; font-size: 1.05em;">✅ 剩餘 ${area.remaining} 家</span>
                            </div>
                            ${index === 0 && area.remaining >= 3 ? `<div style="color: #ff6b35; margin-top: 6px; font-size: 0.85em;">💡 ${region}首選，空檔充足</div>` : ''}
                        </div>
                    `;
                }).join('');
                
                html += '</div>';
            });
            
            if (html === '') {
                container.innerHTML = '<div style="text-align: center; padding: 30px; color: #999;">目前無符合條件的區域（人口>20萬 + 未額滿）</div>';
            } else {
                container.innerHTML = html;
            }
        }

        // 方案 B：顯示最新開店動態
        function displayRecentStores() {
            // 最近新增的店家（根據實際情況手動更新）
            const recentStores = [
                { area: '新北市板橋區', store: 'INFUN板橋2店', date: '今日' },
                { area: '台北市文山區', store: 'ONE文山店', date: '今日' },
                { area: '桃園市平鎮區', store: '桃園平鎮店', date: '今日' },
                { area: '台中市西區', store: 'ONE桌遊台中民權店', date: '今日' },
                { area: '台中市北區', store: '台中·玩Bar店', date: '今日' },
                { area: '台中市西屯區', store: '台中漢口店', date: '今日' },
                { area: '高雄市左營區', store: '威勝桌遊館 高雄左營店', date: '本週' }
            ];
            
            const container = document.getElementById('recentStoresList');
            
            container.innerHTML = recentStores.map(item => `
                <div style="background: #f0f7ff; padding: 15px 20px; border-radius: 10px; margin-bottom: 12px; border-left: 4px solid #2196f3;">
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <div style="flex: 1;">
                            <span style="background: #2196f3; color: white; padding: 3px 12px; border-radius: 12px; font-size: 0.85em; margin-right: 12px;">⏰ ${item.date}</span>
                            <span style="font-weight: bold; color: #333; font-size: 1.1em;">${item.area}</span>
                            <span style="color: #666; margin-left: 8px;">- ${item.store}</span>
                        </div>
                    </div>
                </div>
            `).join('');
            
            container.innerHTML += `
                <div style="text-align: center; padding: 20px; color: #999; font-size: 0.95em; border-top: 2px dashed #ddd; margin-top: 20px;">
                    💡 提示：这些區域正在快速發展中，競爭對手已進入，建議儘快評估！
                </div>
            `;
        }

        // 方案 D：智慧配對功能
        function smartMatch() {
            const county = document.getElementById('regionFilter').value;
            const target = document.getElementById('targetFilter').value;
            const sortMethod = document.getElementById('sortFilter').value;
            
            // 篩選可開店區域
            let filtered = areasData.filter(area => {
                const remaining = area.quota - area.stores;
                if (remaining <= 0 || area.isSpecial) return false;
                
                // 縣市篩選
                if (county !== 'all') {
                    if (area.county !== county) return false;
                }
                
                // 目標客群篩選
                if (target === 'student') {
                    const key = `${area.county}${area.district}`;
                    if (!universityZones[key]) return false;
                }
                
                return true;
            });
            
            // 加上 key 和 remaining 資訊
            filtered = filtered.map(area => {
                const key = `${area.county}${area.district}`;
                const remaining = area.quota - area.stores;
                const hasUniversity = universityZones[key] ? 1 : 0;
                
                // AI 綜合評分
                let aiScore = area.population / 10000 + remaining * 10;
                if (hasUniversity) aiScore += 20;
                // 已開店數扣分（競爭風險）
                aiScore -= area.stores * 10;
                
                return { ...area, key, remaining, hasUniversity, aiScore };
            });
            
            // 根據排序方式進行排序
            switch(sortMethod) {
                case 'population':
                    // 人口優先：按人口數降序
                    filtered.sort((a, b) => b.population - a.population);
                    break;
                    
                case 'university':
                    // 大學優先：有大學的排前面，然後按人口排序
                    filtered.sort((a, b) => {
                        if (a.hasUniversity !== b.hasUniversity) {
                            return b.hasUniversity - a.hasUniversity;
                        }
                        return b.population - a.population;
                    });
                    break;
                    
                case 'mature':
                    // 成熟商圈優先：已開店數多的排前面（但還有名額）
                    filtered.sort((a, b) => {
                        if (a.stores !== b.stores) {
                            return b.stores - a.stores;
                        }
                        return b.population - a.population;
                    });
                    break;
                    
                case 'ai':
                default:
                    // AI 評分綜合排序：綜合考量人口、剩餘名額、大學商圈
                    filtered.sort((a, b) => b.aiScore - a.aiScore);
                    break;
            }
            
            // 取前5名
            filtered = filtered.slice(0, 5);
            
            // 顯示结果
            const resultsDiv = document.getElementById('matchResults');
            const listDiv = document.getElementById('matchResultsList');
            
            if (filtered.length === 0) {
                listDiv.innerHTML = '<div style="text-align: center; padding: 30px; color: white; opacity: 0.8;">😢 找不到符合條件的區域，請調整篩選條件</div>';
            } else {
                // 根據排序方式決定第一名的提示文字
                const topRankText = {
                    'ai': '🏆 最推薦：AI 綜合評分排名第一',
                    'population': '🏆 最推薦：人口數最多的區域',
                    'university': '🏆 最推薦：大學商圈最佳選擇',
                    'mature': '🏆 最推薦：最成熟的商圈'
                };
                
                listDiv.innerHTML = filtered.map((area, i) => {
                    const remaining = area.quota - area.stores;
                    const university = universityZones[area.key];
                    
                    return `
                        <div style="background: white; color: #333; padding: 20px; border-radius: 12px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.1);">
                            <div style="font-size: 1.2em; font-weight: bold; margin-bottom: 10px; color: #667eea;">
                                ${i + 1}. ${area.county}${area.district}
                                ${university ? `<span style="background: #e3f2fd; color: #1976d2; padding: 3px 10px; border-radius: 12px; font-size: 0.7em; margin-left: 8px;">🎓 ${university}</span>` : ''}
                            </div>
                            <div style="color: #666; line-height: 1.8;">
                                👥 人口：${(area.population / 10000).toFixed(1)} 萬人<br>
                                📊 開店限額：${area.quota} 家<br>
                                🏪 已開業：${area.stores} 家<br>
                                <span style="color: #4caf50; font-weight: bold;">✅ 剩餘名額：${remaining} 家</span>
                            </div>
                            ${i === 0 ? `<div style="margin-top: 10px; padding: 10px; background: #fff3e0; border-radius: 8px; color: #ff6b35; font-size: 0.9em;">${topRankText[sortMethod]}</div>` : ''}
                        </div>
                    `;
                }).join('');
            }
            
            resultsDiv.style.display = 'block';
        }

        // 頁面載入時更新統計並載入新功能
        window.onload = () => {
            updateStats();
            displayHotZones();
            displayRecentStores();
        };

        // Enter 鍵搜尋
        document.getElementById('searchInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') searchArea();
        });
    </script>
