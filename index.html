        }

        .container {
            max-width: 1200px;

            border-radius: 20px;
            padding: 40px;

        h1 {
            color: #ff6b35;
            font-size: 2.5em;
            margin-bottom: 10px;
            text-align: center;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 1.1em;
        }

        .search-box {
            margin-bottom: 30px;
            display: flex;
            gap: 10px;
        }

        .search-box input {
            flex: 1;
            padding: 15px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1.1em;
            transition: border-color 0.3s;
        }

        .search-box input:focus {
            outline: none;
            border-color: #ff6b35;
        }

        .search-box button {
            padding: 15px 40px;
            background: linear-gradient(135deg, #ff6b35 0%, #f7931e 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .search-box button:hover {
            transform: scale(1.05);
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .stat-card.clickable {
            background: linear-gradient(135deg, #fff5f0 0%, #ffe6d5 100%);
            border: 2px solid #ff6b35;
        }

        .stat-number {
            font-size: 2.5em;
            font-weight: 900;
            color: #ff6b35;
            margin-bottom: 5px;
        }

        .stat-label {
            color: #666;
            font-size: 1em;
        }

        .results {
            margin-top: 30px;
        }

        .result-item {
            background: #f9f9f9;
            border-left: 5px solid #ff6b35;
            padding: 20px;
            margin-bottom: 15px;
            border-radius: 10px;
            transition: transform 0.2s;
        }

        .result-item:hover {
            transform: translateX(5px);
        }

        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .result-title {
            font-size: 1.4em;
            font-weight: bold;
            color: #333;
        }

        .badge {
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9em;
            font-weight: bold;
        }

        .badge-full {
            background: #ff4444;
            color: white;
        }

        .badge-available {
            background: #4caf50;
            color: white;
        }

        .badge-special {
            background: #ffc107;
            color: #333;
        }

        .result-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmin(150px, 1fr));
            gap: 15px;
            margin-bottom: 15px;
        }

        .detail-item {
            background: white;
            padding: 10px;
            border-radius: 8px;
        }

        .detail-label {
            color: #999;
            font-size: 0.85em;
            margin-bottom: 5px;
        }

        .detail-value {
            font-size: 1.2em;
            font-weight: bold;
            color: #333;
        }

        .stores-list {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #e0e0e0;
        }

        .stores-title {
            color: #666;
            font-size: 0.9em;
            margin-bottom: 10px;
        }

        .store-tag {
            display: inline-block;
            background: #e3f2fd;
            color: #1976d2;
            padding: 5px 12px;
            border-radius: 15px;
            margin: 5px 5px 5px 0;
            font-size: 0.9em;
        }

        .no-results {
            text-align: center;
            padding: 40px;
            color: #999;
            font-size: 1.2em;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 1000;
            overflow-y: auto;
        }

        .modal-content {
            max-width: 900px;
            margin: 50px auto;
            background: white;
            border-radius: 20px;
            padding: 40px;
            position: relative;
        }

        .modal-close {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 2em;
            cursor: pointer;
            color: #999;
            transition: color 0.3s;
        }

        .modal-close:hover {
            color: #ff6b35;
        }

        .modal-title {
            font-size: 2em;
            color: #ff6b35;
            margin-bottom: 20px;
        }

        .modal-list {
            display: grid;
            gap: 15px;
        }

        .modal-item {
            background: #f9f9f9;
            padding: 15px;
            border-radius: 10px;
            border-left: 4px solid #ff6b35;
        }

        .modal-item-title {
            font-size: 1.2em;
            font-weight: bold;
            color: #333;
            margin-bottom: 5px;
        }

        .modal-item-details {
            color: #666;
            font-size: 0.9em;
        }

            .container {
                padding: 20px;

            }

            }

            .result-header {

                align-items: flex-start;

            }

            .modal-content {

                padding: 20px;
            }

</head>

            { county: '高雄市', district: '三民區', population: 328532, stores: 2, storeNames: ['大昌店', '三民店'], isSpecial: false },
            { county: '高雄市', district: '苓雅區', population: 160900, stores: 1, storeNames: ['苓雅店'], isSpecial: false },
            { county: '高雄市', district: '前鎮區', population: 176568, stores: 1, storeNames: ['ONE高雄前鎮'], isSpecial: false },
            { county: '高雄市', district: '左營區', population: 198000, stores: 1, storeNames: ['威勝桌遊館 高雄左營店'], isSpecial: false },
            
            // 屏東縣
            { county: '屏東縣', district: '屏東市', population: 191218, stores: 1, storeNames: ['中正店'], isSpecial: false },
            { county: '屏東縣', district: '潮州鎮', population: 53689, stores: 0, storeNames: [], isSpecial: false },
            { county: '屏東縣', district: '內埔鄉', population: 52702, stores: 0, storeNames: [], isSpecial: false },
            { county: '屏東縣', district: '萬丹鄉', population: 48623, stores: 0, storeNames: [], isSpecial: false },
            { county: '屏東縣', district: '東港鎮', population: 45809, stores: 0, storeNames: [], isSpecial: false },
            
            // 花蓮縣
            { county: '花蓮縣', district: '吉安鄉', population: 82938, stores: 0, storeNames: [], isSpecial: false },
            
            // 台東縣
            { county: '台東縣', district: '台東市', population: 102558, stores: 0, storeNames: [], isSpecial: false },
            
            // 澎湖縣
            { county: '澎湖縣', district: '馬公市', population: 63090, stores: 1, storeNames: ['澎湖店'], isSpecial: false },
            
            // 金門縣
            { county: '金門縣', district: '金寧鄉', population: 35619, stores: 1, storeNames: ['金門店'], isSpecial: false },
            { county: '金門縣', district: '金城鎮', population: 40860, stores: 0, storeNames: [], isSpecial: false }
        ];

        // 計算每個區域的配額和狀態
        areasData.forEach(area => {
            area.quota = QUOTA_RULES.calculate(area.population);
            area.remaining = area.quota - area.stores;
            area.isFull = area.remaining <= 0;
        });

        // 更新統計數據
        function updateStats() {
            document.getElementById('totalAreas').textContent = areasData.length;
            document.getElementById('totalStores').textContent = areasData.reduce((sum, a) => sum + a.stores, 0);
            // 包含：實際額滿 + 舊約額滿 + 不開放/保留的區域
            const fullCount = areasData.filter(a => 
                a.isFull || 
                (a.isSpecial && a.specialNote && (
                    a.specialNote.includes('舊約額滿') ||
                    a.specialNote.includes('不開放') || 
                    a.specialNote.includes('保留')
                ))
            ).length;
            document.getElementById('fullAreas').textContent = fullCount;
        }

        // 顯示額滿區域
        function showFullAreas() {
            // 包含：1) 實際額滿的區域 2) 舊約額滿 3) 標記為不開放/保留的區域
            const fullAreas = areasData.filter(a => 
                a.isFull || 
                (a.isSpecial && a.specialNote && (
                    a.specialNote.includes('舊約額滿') ||
                    a.specialNote.includes('不開放') || 
                    a.specialNote.includes('保留')
                ))
            );
            const listDiv = document.getElementById('fullAreasList');
            
            if (fullAreas.length === 0) {
                listDiv.innerHTML = '<div class="no-results">目前沒有額滿區域</div>';
            } else {
                listDiv.innerHTML = fullAreas.map(area => `
                    <div class="modal-item">
                        <div class="modal-item-title">${area.county} ${area.district}</div>
                        <div class="modal-item-details">
                            人口：${area.population.toLocaleString()} | 
                            限額：${area.quota}家 | 
                            已開業：${area.stores}家
                            ${area.isSpecial ? ' | ⚠️ ' + area.specialNote : ''}
                        </div>
                        ${area.storeNames.length > 0 ? `
                            <div style="margin-top: 10px;">
                                ${area.storeNames.map(s => `<span class="store-tag">${s}</span>`).join('')}
                            </div>
                        ` : ''}
                    </div>
                `).join('');
            }
            
            document.getElementById('fullAreasModal').style.display = 'block';
        }

        // 顯示所有店家
        function showAllStores() {
            const areasWithStores = areasData.filter(a => a.stores > 0);
            const listDiv = document.getElementById('allStoresList');
            
            if (areasWithStores.length === 0) {
                listDiv.innerHTML = '<div class="no-results">目前沒有已開業店家</div>';
            } else {
                // 按縣市分組
                const groupedByCounty = {};
                areasWithStores.forEach(area => {
                    if (!groupedByCounty[area.county]) {
                        groupedByCounty[area.county] = [];
                    }
                    groupedByCounty[area.county].push(area);
                });
                
                // 對每個縣市內的區域按店家數排序
                Object.keys(groupedByCounty).forEach(county => {
                    groupedByCounty[county].sort((a, b) => b.stores - a.stores);
                });
                
                // 從北到南的縣市順序
                const countyOrder = [
                    '基隆市', '台北市', '新北市', '宜蘭縣',
                    '桃園市', '新竹市', '新竹縣', '苗栗縣',
                    '台中市', '彰化縣', '南投縣', '雲林縣',
                    '嘉義市', '嘉義縣', '台南市', '高雄市',
                    '屏東縣', '花蓮縣', '台東縣',
                    '澎湖縣', '金門縣', '連江縣'
                ];
                
                // 按從北到南排序
                const sortedCounties = Object.keys(groupedByCounty).sort((a, b) => {
                    const indexA = countyOrder.indexOf(a);
                    const indexB = countyOrder.indexOf(b);
                    return indexA - indexB;
                });
                
                listDiv.innerHTML = sortedCounties.map(county => {
                    const areas = groupedByCounty[county];
                    const totalStores = areas.reduce((sum, a) => sum + a.stores, 0);
                    
                    return `
                        <div style="margin-bottom: 30px;">
                            <h3 style="color: #ff6b35; margin-bottom: 15px; font-size: 1.5em; border-bottom: 2px solid #ff6b35; padding-bottom: 10px;">
                                📍 ${county} (${totalStores} 家店)
                            </h3>
                            ${areas.map(area => `
                                <div class="modal-item">
                                    <div class="modal-item-title">${area.district} (${area.stores}家)</div>
                                    <div class="modal-item-details">
                                        人口：${area.population.toLocaleString()} | 
                                        限額：${area.quota}家 | 
                                        剩餘：${Math.max(0, area.remaining)}家
                                        ${area.isFull ? ' | 🔴 額滿' : ' | 🟢 可開店'}
                                    </div>
                                    <div style="margin-top: 10px;">
                                        ${area.storeNames.map(s => `<span class="store-tag">${s}</span>`).join('')}
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    `;
                }).join('');
            }
            
            document.getElementById('allStoresModal').style.display = 'block';
        }

        // 關閉 Modal
        function closeModal(modalId) {
            document.getElementById(modalId).style.display = 'none';
        }

        // 點擊 Modal 外部關閉
        window.onclick = (event) => {
            if (event.target.classList.contains('modal')) {
                event.target.style.display = 'none';
            }
        };

        // 搜尋功能
        function searchArea() {
            const query = document.getElementById('searchInput').value.trim().toLowerCase();
            const resultsDiv = document.getElementById('results');
            
            if (!query) {
                resultsDiv.innerHTML = '<div class="no-results">請輸入縣市或鄉鎮市區名稱進行搜尋</div>';
                return;
            }

            const results = areasData.filter(area => 
                area.county.toLowerCase().includes(query) || 
                area.district.toLowerCase().includes(query)
            );

            if (results.length === 0) {
                resultsDiv.innerHTML = '<div class="no-results">找不到相關區域</div>';
                return;
            }

            resultsDiv.innerHTML = results.map(area => `
                <div class="result-item">
                    <div class="result-header">
                        <div class="result-title">${area.county} ${area.district}</div>
                        <div>
                            ${area.isFull ? '<span class="badge badge-full">額滿</span>' : '<span class="badge badge-available">可開店</span>'}
                            ${area.isSpecial ? '<span class="badge badge-special">' + (area.specialNote || '特殊') + '</span>' : ''}
                        </div>
                    </div>
                    <div class="result-details">
                        <div class="detail-item">
                            <div class="detail-label">人口數</div>
                            <div class="detail-value">${area.population.toLocaleString()}</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">店家限額</div>
                            <div class="detail-value">${area.quota} 家</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">已開業</div>
                            <div class="detail-value">${area.stores} 家</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">剩餘名額</div>
                            <div class="detail-value" style="color: ${area.remaining > 0 ? '#4caf50' : '#ff4444'}">${Math.max(0, area.remaining)} 家</div>
                        </div>
                    </div>
                    ${area.storeNames.length > 0 ? `
                        <div class="stores-list">
                            <div class="stores-title">已開業店家：</div>
                            ${area.storeNames.map(store => `<span class="store-tag">${store}</span>`).join('')}
                        </div>
                    ` : ''}
                </div>
            `).join('');
        }

        // 頁面載入時更新統計
        window.onload = () => {
            updateStats();
        };

        // Enter 鍵搜尋
        document.getElementById('searchInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') searchArea();
        });
    </script>
</body>
</html>
